################################################################################
# Forest level
# Dialogs
level.forest.dialog.intro.title = So It Begins...
level.forest.event.intro.text = You are in the forest. You are yellow.\nReason for you being here (or for being so yellow) \
  is unknown and probably non-existent.\n\
  For some reason, there is no way back, only forward.\n\n\
  Dialogs like this one are rather annoying for most yellow adventurers.\nGods of this world have, however, agreed that all dialogs\n\
  may be disabled by pressing 'H'. The message will then only appear\nin the event log, accessible through the menu, \n\
  or by pressing 'E'. Signifficantly less annoying notification will also be shown on the screen.\n\n\
  Full list of game hotkeys may be accessed through the main menu.

level.forest.dialog.item.title = Items
level.forest.event.item.text = Items are insentient objects that usually have some purpose. \n\
  To interact with an item, move close to it,\nand press the 'Investigate' button that appears.

level.forest.dialog.pickup.title = Item Pickup
level.forest.event.pickup.text = Any item that was picked up will appear in the inventory.\nInventory is accessible through the menu,\n\
  or by pressing 'I' hotkey.

level.forest.dialog.wall.init.title = Well...
level.forest.event.wall.init.text = It would be considered an utter waste to let a perfectly round object fade\ninto oblivion by leaving it lying \
  on the ground.\n What appreciation do squirrels have for such things anyway?

level.forest.dialog.wall.quest.title = Turn back and think about our life...
level.forest.event.wall.quest.text = What is the purpose of a geezer, randomly standing on a forest path?\nWhat if he was looking for \
  a coin to buy himself a subway sandwich?

level.forest.dialog.unit-intro.title = Creatures
level.forest.event.unit-intro.text = Not unlike items, creatures may also be interacted with.\nIt is worth noting that it is in their nature \
  to be more cunning,\nand therefore dangerous, than insentient objects.\n\
  This problem may often be remedied by killing them.

level.forest.dialog.exploration-north.title = Random observation
level.forest.event.exploration-north.text = Please note how unnaturally tiny all the trees in this forest are,\n\
  compared to everything else.

########################################
# Quests
level.forest.quest.coin-delivery.name = Coin Delivery
level.forest.quest.coin-delivery.description = This uninspired tutorial quest showcases the principle of all quests\n\
  that you'll encounter during the course of this game.\nComplete all tasks to make the gods satisfied.
level.forest.quest.coin-delivery.task.pickup = Pick up the coin.
level.forest.quest.coin-delivery.task.delivery = Deliver the coin (to whom?).

########################################
# Items
level.forest.item.coin.name = Gold Coin
level.forest.item.coin.description = Purpose of coins is to serve as a type of currency.\n\
  For that reason, they are usually made of valuable materials.\n\
  This one is made of gold, which is almost as yellow as you are.\n\n\
  In larger quantities, coins in a purse may also serve as an excellent,\nand unexpected, bludgeoning weapon \n\
  with pleasant rattling sound upon impact.

########################################
# Interactions
level.forest.interaction.coin.title = Suspiciously Yellow Object
level.forest.interaction.coin.pickup.description = It is rather unnatural to see something so perfectly round\n\
  and shiny lying on the forest ground. It seems as if it was planted here.
level.forest.interaction.coin.pickup.decision.pickup = Pick up
level.forest.interaction.coin.pickup.decision.ignore = Ignore

level.forest.interaction.ukko.title = Ukko
level.forest.interaction.ukko.talk.description = My name happens to be Ukko and I'm reluctant to discuss my purpose.
level.forest.interaction.ukko.talk.decision.purpose = Discuss Ukko's purpose
level.forest.interaction.ukko.talk.decision.delivery = Offer the coin

level.forest.interaction.ukko.discuss.description = I hate you...
level.forest.interaction.ukko.discuss.decision.delivery = Offer the coin

level.forest.interaction.ukko.delivery-result.description = Inconceivable... It is almost as if I was meant to\n\
  buy a subway sandwich, if only there were any subway stations around here.

level.forest.interaction.caravan.title = Caravan Wreck
level.forest.interaction.caravan.investigate.description = It might have seemed that all these side paths are empty\n\
  but that's not the case. This caravan serves no purpose, but it's pretty cool.

