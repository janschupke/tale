################################################################################
# Forest level
# Dialogs
level.forest.dialog.intro.title = So It Begins...
level.forest.event.intro.text = You are in the forest. You are yellow. Reason for you being here (or for being so yellow) \
  is unknown and probably non-existent. \
  For some reason, there is no way back, only forward.\n\n\
  Dialogs like this one are rather annoying for most yellow adventurers. Gods of this world have, however, agreed that all dialogs \
  may be disabled by pressing 'H'. The message will then only appear in the message log, accessible through the menu, \
  or by pressing 'E'. Signifficantly less annoying notification will also be shown on the screen.\n\n\
  Full list of game hotkeys may be accessed through the main menu.

level.forest.dialog.item.title = Items
level.forest.event.item.text = Items are insentient objects that usually have some purpose. \
  To interact with an item, move close to it, and press the 'Investigate' button (or space hotkey) that appears.\n\n\
  It is worth noting that pressing Escape during any interaction will end it, and pressing Enter will select the first available option.

level.forest.dialog.pickup.title = Item Pickup
level.forest.event.pickup.text = Any item that was picked up will appear in the inventory. Inventory is accessible through the menu, \
  or by pressing 'I' hotkey.

level.forest.dialog.wall.init.title = Well...
level.forest.event.wall.init.text = It would be considered an utter waste to let a perfectly round object fade into oblivion by leaving it lying \
  on the ground.\n What appreciation do squirrels have for such things anyway?

level.forest.dialog.wall.quest.title = Turn back and think about our life...
level.forest.event.wall.quest.text = What is the purpose of a geezer, randomly standing on a forest path?\nWhat if he was looking for \
  a coin to buy himself a subway sandwich?

level.forest.dialog.unit-intro.title = Creatures
level.forest.event.unit-intro.text = Not unlike items, creatures may also be interacted with. It is worth noting that it is in their nature \
  to be more cunning, and therefore dangerous, than insentient objects. \
  This problem may often be remedied by killing them.

level.forest.dialog.exploration-north.title = Random observation
level.forest.event.exploration-north.text = Please note how unnaturally tiny all the trees in this forest are, \
  compared to everything else.

########################################
# Quests
level.forest.quest.intro.delivery.name = Coin Delivery
level.forest.quest.intro.delivery.description = This uninspired tutorial quest showcases the principle of all quests \
  that you'll encounter during the course of this game. Complete all tasks to make the gods satisfied.
level.forest.quest.intro.delivery.task.pickup = Pick up the coin.
level.forest.quest.intro.delivery.task.delivery = Deliver the coin (to whom?).

########################################
# Items
level.forest.item.coin.name = Gold Coin
level.forest.item.coin.description = Purpose of coins is to serve as a type of currency. \
  For that reason, they are usually made of valuable materials. \
  This one is made of gold, which is almost as yellow as you are.\n\n\
  In larger quantities, coins in a purse may also serve as an excellent, and unexpected, bludgeoning weapon \
  with pleasant rattling sound upon impact.

########################################
# Interactions
level.forest.interaction.coin.title = Suspiciously Yellow Object
level.forest.interaction.coin.pickup.description = It is rather unnatural to see something so perfectly round \
  and shiny lying on the forest ground. It seems as if it was planted here.
level.forest.interaction.coin.pickup.decision.pickup = Pick up
level.forest.interaction.coin.pickup.decision.ignore = Ignore

level.forest.interaction.ukko.title = Ukko
level.forest.interaction.ukko.talk.description = My name happens to be Ukko and I'm reluctant to discuss my purpose.
level.forest.interaction.ukko.talk.decision.purpose = Discuss Ukko's purpose
level.forest.interaction.ukko.talk.decision.delivery = Offer the coin

level.forest.interaction.ukko.discuss.description = I hate you...
level.forest.interaction.ukko.discuss.decision.delivery = Offer the coin

level.forest.interaction.ukko.delivery-result.description = Inconceivable... It is almost as if I was meant to \
  buy a subway sandwich, if only there were any subway stations around here.

level.forest.interaction.caravan.title = Caravan Wreck
level.forest.interaction.caravan.investigate.description = It might have seemed that all these side paths are empty \
  but that's not the case. This caravan serves no purpose, but it's pretty cool.

