# Items
level.outskirts.item.lumber.name = Lumber
level.outskirts.item.lumber.description = Made of tree corpses, lumber is typically used as a fuel or a building material.\n\n\
  It also makes an excellent weapon.

level.outskirts.item.varpunen.name = Varpunen Jouluaamuna
level.outskirts.item.varpunen.description = Lumi on jo peittänyt kukat laaksosessa,\n\
  järven aalto jäätynyt talvipakkasessa.\n\
  Varpunen pienoinen, syönyt kesäeinehen,\n\
  järven aalto jäätynyt talvipakkasessa.\n\n\
  Pienen pirtin portailla oli tyttökulta:\n\
  Tule, varpu, riemulla, ota siemen multa!\n\
  Joulu on, koditon varpuseni onneton,\n\
  tule tänne riemulla, ota siemen multa!\n\n\
  Tytön luo nyt riemuiten lensi varpukulta:\n\
  Kiitollisna siemenen otan kyllä sulta.\n\
  Palkita Jumala tahtoo kerran sinua.\n\
  kiitollisna siemenen otan kyllä sulta!\n\n\
  En mä ole, lapseni, lintu tästä maasta,\n\
  olen pieni veljesi, tulin taivahasta.\n\
  Siemenen pienoisen, jonka annoit köyhällen,\n\
  pieni sai sun veljesi enkeleitten maasta.

